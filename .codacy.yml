---
# Codacy configuration for github-template-ai-agents
# See: templates/codacy/.codacy.yml for reference template
# See: .agents/skills/codacy/references/config-format.md for format docs

exclude_paths:
  - "target/**"
  - "node_modules/**"
  - "vendor/**"
  - "**/dist/**"
  - "**/build/**"
  # docling.py: subprocess calls with SSRF validation by is_safe_url().
  # Inline # NOSONAR did not suppress Codacy SonarPython findings.
  - ".agents/skills/do-web-doc-resolver/scripts/providers/docling.py"
  # Test files: subprocess list-form calls and tempfile usage are safe patterns.
  - ".agents/skills/do-web-doc-resolver/tests/integration/**"
  - "tests/test_update_ci_status.py"
  # Shell templates: ${var:?} is standard bash parameter validation.
  - ".agents/skills/agent-browser/templates/**"

engines:
  duplication:
    enabled: true
    exclude_paths:
      - "**/tests/**"
      - "**/*.test.ts"
      - "**/*_test.go"
  metric:
    enabled: true
    config:
      languages:
        - "python"
        - "typescript"
        - "shell"
  bandit:
    enabled: true
    # B101 (assert) is a false positive in pytest test files where assert is
    # the canonical assertion mechanism.  B110 (try-except-pass) is intentional
    # for best-effort cache cleanup.  Exclude test trees from these patterns.
    exclude_paths:
      - "**/tests/**"
  # NOTE: SonarPython's S101 ("Use of assert detected") generates 117 High
  # severity false positives in test files.  Codacy does not expose SonarPython
  # as a configurable engine — neither .codacy.yml, CLI, nor API can suppress
  # these programmatically.  Manual suppression via Codacy dashboard required.
  # See: agents-docs/codacy-triage-2026-06.md — Phase 3, item 1.
