---
# Codacy configuration for github-template-ai-agents
# See: templates/codacy/.codacy.yml for reference template
# See: .agents/skills/codacy/references/config-format.md for format docs

exclude_paths:
  - "target/**"
  - "node_modules/**"
  - "vendor/**"
  - "**/dist/**"
  - "**/build/**"
  # docling.py: subprocess calls with SSRF validation by is_safe_url().
  # Inline # NOSONAR did not suppress Codacy SonarPython findings.
  - ".agents/skills/do-web-doc-resolver/scripts/providers/docling.py"

engines:
  duplication:
    enabled: true
    exclude_paths:
      - "**/tests/**"
      - "**/*.test.ts"
      - "**/*_test.go"
  metric:
    enabled: true
    config:
      languages:
        - "python"
        - "typescript"
        - "shell"
  bandit:
    enabled: true
    # B101 (assert) is a false positive in pytest test files where assert is
    # the canonical assertion mechanism.  B110 (try-except-pass) is intentional
    # for best-effort cache cleanup.  Exclude test trees from these patterns.
    exclude_paths:
      - "**/tests/**"
  # SonarPython: suppress 118 test-assertion false positives ("Use of assert
  # detected") that Codacy flags as High severity in every test file.
  sonarpython:
    enabled: true
    exclude_paths:
      - "**/tests/**"
      - "**/test_*.py"
      - "**/*_test.py"
      - "**/verify_optional_skills.py"
