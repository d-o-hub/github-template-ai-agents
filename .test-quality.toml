# Language-agnostic test and quality contract for AI Agents
# Agents must use these metrics to gauge the "reward" of their episodes.

[quality]
# Expected minimum test depth/coverage conceptually (0-100)
min_coverage_percent = 80

# Maximum allowed test flakiness or failure rate (0-100)
max_flakiness_percent = 0

# Maximum acceptable test suite execution time in seconds
max_runtime_seconds = 300

[rules]
# When agents can auto-merge or when human escalation is required
require_human_review_on_coverage_drop = true
require_human_review_on_breaking_change = true
require_human_review_on_flaky_test = true
