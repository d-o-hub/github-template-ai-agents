description = "Self-learning fix loop - commit, push, monitor CI, auto-fix failures until all checks pass"
prompt = """
Invoke the self-fix-loop skill.
Execute the self-fix-loop script to automate commit, push, CI monitoring, and fix cycles.

Run: `./scripts/self-fix-loop.sh`

This script will:
1. Commit all current changes with a descriptive message
2. Push to the remote repository
3. Monitor GitHub Actions for the current branch/PR
4. If checks fail, analyze the failures and attempt automatic fixes
5. Repeat the loop until all checks pass or the maximum retry limit is reached

Support optional arguments if provided, such as `--max-retries N` or `--timeout SECONDS`.
"""
