# Gitleaks configuration file
# For more information, see https://github.com/gitleaks/gitleaks

[extend]
# Inherit Gitleaks default rules
useDefault = true

[allowlist]
description = "Allow documentation examples and non-sensitive files"
paths = [
    '''CHANGELOG.md''',
    '''CHANGELOG-TEMPLATE.md''',
    '''agents-docs/.*''',
    '''examples/.*''',
    '''.pre-commit-config.yaml''',
    '''.github/workflows/.*'''
]
