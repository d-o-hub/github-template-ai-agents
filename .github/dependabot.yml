---
version: 2
# Dependabot is configured only for ecosystems that exist in this repo:
#   - github-actions: SHA-pinned actions in .github/workflows/
#   - pre-commit:     hooks in .pre-commit-config.yaml
# Ecosystems previously configured (docker, docker-compose, terraform)
# were removed because the repo has no Dockerfiles, no docker-compose files,
# and no Terraform manifests — Dependabot was failing weekly with
# "No Dockerfiles nor Kubernetes YAML found in /" before the removal.
# See commit history for the removal.
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Pre-commit hooks
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "deps"
      - "pre-commit"
    commit-message:
      prefix: "ci"
