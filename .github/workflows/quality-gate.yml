---
name: Quality Gate

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup skills
        run: ./scripts/setup-skills.sh

      - name: Set up Node.js
        uses: actions/setup-node@1d7159d3a7d062d5236712367527063f9d3b45a0  # v4.2.0
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Run quality gate
        shell: bash
        run: |
          set -euo pipefail

          if [ -x ./scripts/quality_gate.sh ]; then
            ./scripts/quality_gate.sh
          else
            echo "scripts/quality_gate.sh not found or not executable" >&2
            exit 1
          fi
