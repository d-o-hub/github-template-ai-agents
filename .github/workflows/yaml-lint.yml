---
name: YAML Lint

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
      - develop
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  yamllint:
    name: YAML Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@0b92561175653b655519f7274092b77d63d80a13  # v6.2.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -d \
            "{extends: default, rules: {line-length: {max: 120}, indentation: {spaces: 2}}}" \
            .github/ || (echo "❌ YAML lint failed" && exit 1)

  actionlint:
    name: GitHub Actions Workflow Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6.0.2

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1
        with:
          fail_level: error
          filter_mode: nofilter
