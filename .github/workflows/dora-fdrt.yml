---
name: DORA FDRT Recording
on:
  issues:
    types: [closed]

jobs:
  record-fdrt:
    if: contains(github.event.issue.labels.*.name, 'release-failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Calculate FDRT
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const issue = context.payload.issue;
            const created = new Date(issue.created_at);
            const closed = new Date(issue.closed_at);
            const diffHours = ((closed - created) / 1000 / 60 / 60).toFixed(2);

            core.summary
              .addHeading('DORA Failed Deployment Recovery Time (FDRT)')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Issue #', String(issue.number)],
                ['Detected At', issue.created_at],
                ['Recovered At', issue.closed_at],
                ['FDRT (hours)', diffHours],
              ])
              .write();

            console.log(`FDRT: ${diffHours} hours`);

            const metric = {
              date: new Date().toISOString().split('T')[0],
              metric: "fdrt",
              issue: issue.number,
              detected_at: issue.created_at,
              recovered_at: issue.closed_at,
              fdrt_hours: parseFloat(diffHours)
            };

            const fs = require('fs');
            fs.writeFileSync('dora-metrics.jsonl', JSON.stringify(metric) + '\n');

      - name: Upload DORA Metrics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: dora-metrics-fdrt-${{ github.event.issue.number }}
          path: dora-metrics.jsonl
