---
name: Security Scanning

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck-security:
    name: ShellCheck Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          format: sarif
          output: shellcheck-results.sarif

      - name: Upload ShellCheck SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          sarif_file: shellcheck-results.sarif
          category: shellcheck

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87cb48f1  # v0.35.0
        with:
          scan-type: 'fs'
          security-checks: 'vuln,secret,config'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail the job, just report
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  secret-detection:
    name: Secrets & Leaks Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9

      - name: Trufflehog Scan
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6  # v3.94.3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2

  iac-scan:
    name: Infrastructure as Code Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan GitHub Actions with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87cb48f1  # v0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.github/workflows/'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          exit-code: '0'  # Don't fail, just report
          ignore-unfixed: true

      - name: Upload IaC Scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0  # v4.35.2
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - shellcheck-security
      - trivy-fs
      - secret-detection
      - codeql
      - iac-scan
    if: always()
    permissions:
      contents: read
    steps:
      - name: Generate Security Report
        run: |
          echo "=========================================="
          echo "     🔒 SECURITY SCAN SUMMARY"
          echo "=========================================="
          echo ""
          echo "Job Results:"
          echo "  • ShellCheck Security: ${{ needs.shellcheck-security.result }}"
          echo "  • Trivy Filesystem: ${{ needs.trivy-fs.result }}"
          echo "  • Secret Detection: ${{ needs.secret-detection.result }}"
          echo "  • CodeQL Analysis: ${{ needs.codeql.result }}"
          echo "  • IaC Scan: ${{ needs.iac-scan.result }}"
          echo ""

          shellcheck_result="${{ needs.shellcheck-security.result }}"
          trivy_result="${{ needs.trivy-fs.result }}"
          secret_result="${{ needs.secret-detection.result }}"

          if [[ "$shellcheck_result" == "failure" ]] || \
             [[ "$trivy_result" == "failure" ]] || \
             [[ "$secret_result" == "failure" ]]; then
            echo "❌ CRITICAL/HIGH vulnerabilities detected!"
            echo "   Review the Security tab for details."
          else
            echo "✅ All critical security checks passed."
          fi
