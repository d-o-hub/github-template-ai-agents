---
name: Markdown Lint

# yamllint disable-line rule:truthy
on:
  push:
    branches: ['**']
    paths:
      - '**.md'
      - '.markdownlint-cli2.jsonc'
  pull_request:
    branches: ['**']
    paths:
      - '**.md'
      - '.markdownlint-cli2.jsonc'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  markdownlint:
    name: Markdown Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@1d7159d3a7d062d5236712367527063f9d3b45a0  # v4.2.0
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: |
          markdownlint-cli2 '**/*.md' 2>&1 || \
            (echo "❌ Markdown lint failed. Fix errors with: markdownlint-cli2 --fix '**/*.md'" && exit 1)
