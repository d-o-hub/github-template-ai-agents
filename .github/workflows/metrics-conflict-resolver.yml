---
name: Metrics Conflict Resolver

# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

# Default permissions
# `workflows: write` is required so the auto-merge can push to PR branches
# that include workflow-file changes (e.g. updates to .github/workflows/*).
# Without it, the GitHub Actions App token is rejected with:
#   "refusing to allow a GitHub App to create or update workflow
#    `.github/workflows/X.yml` without `workflows` permission"
permissions:
  contents: write
  pull-requests: read
  workflows: write

jobs:
  resolve:
    name: Auto-resolve metrics.jsonl conflicts
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Resolve for current PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin main
          # merge=union in .gitattributes handles the conflict automatically
          if git merge origin/main --no-edit; then
            git push origin "HEAD:$PR_HEAD_REF"
          else
            printf -- "Automatic merge failed even with union driver. Manual intervention required.\n"
            exit 1
          fi

      - name: Resolve for all open PRs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all open PRs
          PRS=$(gh pr list --state open --json headRefName,number --jq ".[] | @base64")

          for row in $PRS; do
            _jq() {
              echo "${row}" | base64 --decode | jq -r "${1}"
            }
            PR_BRANCH=$(_jq ".headRefName")
            PR_NUMBER=$(_jq ".number")

            printf -- "Processing PR #%s (branch: %s)\n" "$PR_NUMBER" "$PR_BRANCH"

            # Checkout PR branch
            git checkout "$PR_BRANCH"

            # Attempt to merge main
            if git merge origin/main --no-edit; then
              if git diff --quiet 'HEAD@{1}' HEAD; then
                printf -- "No changes to push for PR #%s\n" "$PR_NUMBER"
              else
                git push origin "$PR_BRANCH"
                printf -- "Successfully merged main into PR #%s\n" "$PR_NUMBER"
              fi
            else
              printf -- "Automatic merge failed for PR #%s. Skipping.\n" "$PR_NUMBER"
              git merge --abort || true
            fi
          done
