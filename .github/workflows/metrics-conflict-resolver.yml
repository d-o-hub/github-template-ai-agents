---
name: Metrics Conflict Resolver

# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

# Default permissions
permissions:
  contents: write
  pull-requests: read

jobs:
  resolve:
    name: Auto-resolve metrics.jsonl conflicts
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Resolve for current PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin main
          # merge=union in .gitattributes handles the conflict automatically
          if git merge origin/main --no-edit; then
            git push origin "HEAD:$PR_HEAD_REF"
          else
            printf "Automatic merge failed even with union driver. Manual intervention required.\n"
            exit 1
          fi

      - name: Resolve for all open PRs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all open PRs
          PRS=$(gh pr list --state open --json headRefName,number --jq '.[] | @base64')

          for row in $PRS; do
            _jq() {
              echo "${row}" | base64 --decode | jq -r "${1}"
            }
            PR_BRANCH=$(_jq '.headRefName')
            PR_NUMBER=$(_jq '.number')

            printf "Processing PR # (branch: )\n" "$PR_NUMBER" "$PR_BRANCH"

            # Checkout PR branch
            git checkout "$PR_BRANCH"

            # Attempt to merge main
            if git merge origin/main --no-edit; then
              if git diff --quiet HEAD@{1} HEAD; then
                printf "No changes to push for PR #\n" "$PR_NUMBER"
              else
                git push origin "$PR_BRANCH"
                printf "Successfully merged main into PR #\n" "$PR_NUMBER"
              fi
            else
              printf "Automatic merge failed for PR #. Skipping.\n" "$PR_NUMBER"
              git merge --abort || true
            fi
          done
