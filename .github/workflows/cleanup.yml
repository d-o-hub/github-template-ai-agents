---
name: Resource Cleanup

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Cleanup Evaluation Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run cleanup script
        run: |
          find . -name "*-workspace" -type d -exec rm -rf {} +
          find . -name "timing.json" -delete
          find . -name "grading.json" -delete
          find . -name "benchmark.json" -delete

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: cleanup evaluation artifacts"
          branch: cleanup-artifacts
          title: "chore: cleanup evaluation artifacts"
          body: "Automated cleanup of temporary evaluation artifacts."

  quality-gate:
    name: Standard Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run quality gate
        run: ./scripts/quality_gate.sh
