---
name: Automated Cleanup

# yamllint disable-line rule:truthy
on:
  # Run weekly on Sundays at 2 AM UTC (low traffic time)
  schedule:
    - cron: '0 2 * * 0'
  
  # Allow manual trigger for testing or urgent cleanup
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not create PR)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-unused:
    name: Detect Unused Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate detection

      - name: Detect unused scripts
        id: unused
        run: |
          echo "# Detecting potentially unused files..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          unused_files=""
          
          # Check each shell script for references
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              script_name=$(basename "$script")
              # Check if script is referenced anywhere (except itself)
              refs=$(grep -r "$script_name" --include="*.yml" --include="*.yaml" --include="*.sh" --include="*.md" . 2>/dev/null | grep -v "^Binary" | grep -v "^\./\.git" | wc -l)
              
              if [ "$refs" -eq 0 ] && [ "$script_name" != "quality_gate.sh" ] && [ "$script_name" != "setup-skills.sh" ]; then
                echo "⚠️ Potentially unused: $script_name (0 references found)" >> $GITHUB_STEP_SUMMARY
                unused_files="$unused_files $script"
              fi
            fi
          done
          
          # Check for broken symlinks
          broken_links=$(find . -type l ! -exec test -e {} \; -print 2>/dev/null | grep -v ".git" || true)
          if [ -n "$broken_links" ]; then
            echo "## Broken Symlinks" >> $GITHUB_STEP_SUMMARY
            echo "$broken_links" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for old temp/debug files
          old_files=$(find scripts/ .agents/ -name "*debug*" -o -name "*temp*" -o -name "*backup*" 2>/dev/null || true)
          if [ -n "$old_files" ]; then
            echo "## Temp/Debug Files" >> $GITHUB_STEP_SUMMARY
            echo "$old_files" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "unused_files=$unused_files" >> $GITHUB_OUTPUT

      - name: Check file ages
        id: ages
        run: |
          echo "## Files Not Modified in 90+ Days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Find files not modified in 90 days (excluding .git, node_modules, etc.)
          old_files=$(find scripts/ .agents/ -type f -mtime +90 -not -path "./.git/*" -not -name "*.md" 2>/dev/null || true)
          
          if [ -n "$old_files" ]; then
            echo "$old_files" | head -10 >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "*(showing first 10)*" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No old files detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run quality gate
        id: quality
        run: |
          echo "## Quality Gate Check" >> $GITHUB_STEP_SUMMARY
          
          if ./scripts/quality_gate.sh; then
            echo "✅ Quality gate passes" >> $GITHUB_STEP_SUMMARY
            echo "quality_passed=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Quality gate failed - cleanup aborted" >> $GITHUB_STEP_SUMMARY
            echo "quality_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true

      - name: Create cleanup PR
        if: github.event.inputs.dry_run != 'true' && steps.quality.outputs.quality_passed == 'true'
        uses: peter-evans/create-pull-request@5b4a9f6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "cleanup: automated detection of unused files"
          title: "[Automated] Cleanup: Remove unused files and technical debt"
          body: |
            ## Automated Cleanup Report
            
            This PR was automatically generated by the cleanup workflow.
            
            ### Detected Issues
            ${{ steps.unused.outputs.unused_files }}
            
            ### Manual Review Required
            ⚠️ **Do not merge without human review**
            
            Please verify:
            - [ ] Each file is truly unused (not dynamically referenced)
            - [ ] No production functionality is affected
            - [ ] Quality gate passes
            - [ ] Documentation is updated if needed
            
            ### How to Disable
            If this PR is not helpful, you can:
            1. Close this PR
            2. Add files to `.cleanup-ignore` to exclude from future scans
            3. Disable workflow in repository settings
            
          draft: true
          branch: automated/cleanup-${{ github.run_number }}
          delete-branch: true
          labels: |
            cleanup
            automated
            technical-debt

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Cleanup Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Detection job: ${{ needs.detect-unused.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- If files were detected, a DRAFT PR was created" >> $GITHUB_STEP_SUMMARY
          echo "- Human review required before merging" >> $GITHUB_STEP_SUMMARY
