---
name: Codacy Analysis

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codacy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codacy-analysis:
    name: Codacy Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491  # v4.1.0

      - name: Run Codacy Analysis CLI
        run: |
          # Use docker directly to avoid unpinned setup-go@v3 in the composite action
          # Pinning to a specific SHA of the codacy/codacy-analysis-cli image
          docker run \
            --rm \
            --env CODACY_PROJECT_TOKEN="${{ secrets.CODACY_PROJECT_TOKEN }}" \
            --volume "$(pwd)":/src \
            --workdir /src \
            codacy/codacy-analysis-cli@sha256:d412b2a84e72d0b541e29dd6cdffa78a73afcf35d8aa546988cd2a44edaab15c \
            analyze \
            --upload \
            --max-allowed-issues 2147483647 \
            --gh-code-scanning-compat \
            --output results.sarif
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: codacy
