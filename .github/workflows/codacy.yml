---
name: Codacy Analysis

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codacy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codacy-analysis:
    name: Codacy Static Code Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # Use the Codacy CLI Docker image directly to sidestep the
      # `actions/setup-go@v3` transitive reference inside
      # `codacy/codacy-analysis-cli-action`, which is rejected by this
      # repo's `sha_pinning_required` branch protection policy.
      # CLI version pinned to the same release the composite action used.
      - name: Run Codacy Analysis CLI
        uses: docker://codacy/codacy-analysis-cli:7.10.0
        with:
          args: >-
            analyze
            --skip-commit-uuid-validation
            --skip-uncommitted-files-check
            --commit-uuid ${{ github.event.pull_request.head.sha || github.sha }}
            --max-allowed-issues 2147483647
            --upload
            --format sarif
            --output results.sarif
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496  # codeql-bundle-v2.25.6
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: codacy
