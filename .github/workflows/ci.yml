---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      agents: ${{ steps.filter.outputs.agents }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.py'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.sh'
              - '**/*.yml'
              - '**/*.yaml'
              - '**/*.toml'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'package.json'
              - 'VERSION'
            agents:
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - 'GEMINI.md'
              - 'QWEN.md'
              - '.agents/**'
              - 'agents-docs/**'
              - '.claude/**'
              - '.qwen/**'
            workflows:
              - '.github/workflows/**'

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: |
      always() &&
      (needs.changes.outputs.code == 'true' ||
       needs.changes.outputs.agents == 'true' ||
       needs.changes.outputs.workflows == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup skills
        run: ./scripts/setup-skills.sh

      - name: Setup Node.js (if package.json exists)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
        if: hashFiles('package.json') != ''

      - name: Setup Rust (if Cargo.toml exists)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # stable
        with:
          components: rustfmt, clippy
        if: hashFiles('Cargo.toml') != ''

      - name: Setup Python (if requirements.txt or pyproject.toml exists)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Setup Go (if go.mod exists)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: '1.21'
        if: hashFiles('go.mod') != ''

      - name: Install dependencies (Node)
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Install dependencies (Python)
        run: |
          pip install ruff black pytest
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Install shellcheck and bats
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Validate agent config schemas
        run: |
          set -euo pipefail
          if ! command -v python3 &>/dev/null; then
            echo "No python3 available, skipping" >&2
            exit 0
          fi
          for config in opencode.json; do
            if [ ! -f "$config" ]; then
              continue
            fi
            SCHEMA_URL=$(python3 -c "
          import json
          with open('$config') as f:
              data = json.load(f)
          print(data.get('\$schema', ''))
          " 2>/dev/null || true)
            if [ -z "$SCHEMA_URL" ]; then
              echo "No \$schema in $config, skipping"
              continue
            fi
            SCHEMA_FILE="/tmp/schema-$(basename "$config")"
            if curl -sfL "$SCHEMA_URL" -o "$SCHEMA_FILE" 2>/dev/null; then
              if python3 -c "
          import json, sys
          try:
              import jsonschema
              with open('$config') as f:
                  data = json.load(f)
              with open('$SCHEMA_FILE') as f:
                  schema = json.load(f)
              jsonschema.validate(data, schema)
              print('OK: $config')
          except ImportError:
              with open('$config') as f:
                  data = json.load(f)
              assert isinstance(data, dict), 'Root must be object'
              print('OK (basic): $config')
          except Exception as e:
              print(f'FAIL: $config: {e}', file=sys.stderr)
              sys.exit(1)
          " 2>/dev/null; then
                echo "Validated $config"
              else
                echo "WARNING: Could not validate $config" >&2
              fi
            else
              echo "WARNING: Could not fetch schema for $config from $SCHEMA_URL" >&2
            fi
          done

      - name: Run quality gate
        run: |
          SKIP_GLOBAL_HOOKS_CHECK=true ./scripts/quality_gate.sh

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [changes, quality-gate]
    if: |
      always() &&
      needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup skills
        run: ./scripts/setup-skills.sh

      - name: Setup Node.js (if package.json exists)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
        if: hashFiles('package.json') != ''

      - name: Setup Rust (if Cargo.toml exists)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # stable
        if: hashFiles('Cargo.toml') != ''

      - name: Setup Python (if requirements.txt or pyproject.toml exists)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Setup Go (if go.mod exists)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: '1.21'
        if: hashFiles('go.mod') != ''

      - name: Install dependencies (Node)
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Install dependencies (Python root)
        run: pip install -r requirements.txt
        if: hashFiles('requirements.txt') != ''

      - name: Install dependencies (Python skills)
        run: |
          for dir in .agents/skills/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Installing dependencies for $dir..."
              pip install -r "$dir/requirements.txt"
            fi
          done
        if: hashFiles('.agents/skills/*/requirements.txt') != ''

      - name: Run tests (Node)
        run: npm test
        if: hashFiles('package.json') != ''

      - name: Run tests (Rust)
        run: cargo test --lib
        if: hashFiles('Cargo.toml') != ''

      - name: Run tests (Python root)
        run: pytest tests/ -v
        if: hashFiles('requirements.txt') != ''

      - name: Run tests (Python skills)
        run: |
          for dir in .agents/skills/*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "Running tests for $dir..."
              (cd "$dir" && python -m pytest tests/ -v -m "not live")
            fi
          done
        if: hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Run tests (Go)
        run: go test ./...
        if: hashFiles('go.mod') != ''

      - name: Setup BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name '*.bats' \
            -print -quit 2>/dev/null)" ]
          then
            echo "Running BATS tests..."
            bats tests/*.bats
          else
            echo "No BATS tests found"
          fi

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality-gate, test]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Update CI status artifacts
        if: github.ref == 'refs/heads/main'
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/update-ci-status.py

      - name: Upload CI status as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: ci-status
          path: |
            .github/ci-status/ci-status.json
            .github/ci-status/ci-summary.md

      - name: Persist CI data to main
        if: github.ref == 'refs/heads/main' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ci-status/
          if git diff --staged --quiet; then
            printf "No changes to CI status\n"
            exit 0
          fi
          git commit -m "ci: update ci status artifacts [skip ci]"
          git push origin main
        continue-on-error: true

      - name: Check all required jobs passed
        run: |
          for res in "${{ needs.quality-gate.result }}" "${{ needs.test.result }}"; do
            if [[ "$res" == "failure" || "$res" == "cancelled" ]]; then
              echo "Required job failed or was cancelled: $res"
              exit 1
            fi
          done
          echo "All required jobs passed (or were correctly skipped)"
