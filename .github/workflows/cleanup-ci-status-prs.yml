---
name: Weekly CI Status PR Cleanup

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '30 3 * * 1'  # Weekly on Monday at 3:30 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Clean Up Stale CI Status PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4.2.2

      - name: Run CI status PR cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          chmod +x scripts/cleanup-ci-status-prs.sh
          ./scripts/cleanup-ci-status-prs.sh
