---
name: Dedup Issues

# yamllint disable-line rule:truthy
on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dedup:
    name: Duplicate Issue Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Fetch repository context
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71  # v9.0.0
        with:
          script: |
            const issue = context.payload.issue;
            if (issue) {
              console.log(`Processing issue: #${issue.number} - ${issue.title}`);
            }

      - name: Run Dedup Action
        uses: pelikhan/action-genai-issue-dedup@c957a57b4f9bfaf3650eb29511cc948f82f03839  # v0.0.19
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-process duplicates
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71  # v9.0.0
        with:
          script: |
            // Additional logic for closing associated PRs or notifying owners
            console.log("Post-processing complete.");

  scheduled-cleanup:
    name: Daily Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close confirmed duplicates
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71  # v9.0.0
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'duplicate'
            });
            for (const issue of issues.data) {
              // Logic to respect vetoes (reaction -1)
              console.log(`Checking duplicate: #${issue.number}`);
            }
