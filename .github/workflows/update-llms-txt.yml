---
name: Update LLM Context Files

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - 'AGENTS.md'
      - 'README.md'
      - '.agents/skills/*/SKILL.md'
      - 'scripts/generate-llms-txt.sh'

permissions:
  contents: write

jobs:
  update-llms:
    name: Regenerate llms.txt and llms-full.txt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Regenerate LLM context files
        run: ./scripts/generate-llms-txt.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt llms-full.txt
          if git diff --cached --quiet; then
            echo "No changes to llms.txt or llms-full.txt"
          else
            git commit -m "ci: regenerate llms.txt and llms-full.txt [skip ci]"
            git push
          fi
