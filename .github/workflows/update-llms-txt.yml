---
name: Update LLM Context Files

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - 'AGENTS.md'
      - 'README.md'
      - '.agents/skills/*/SKILL.md'
      - 'scripts/generate-llms-txt.sh'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-llms:
    name: Regenerate llms.txt and llms-full.txt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Regenerate LLM context files
        run: ./scripts/generate-llms-txt.sh

      - name: Commit and create PR if changed
        run: |
          BRANCH="auto/regenerate-llms-txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -f llms.txt llms-full.txt
          if git diff --cached --quiet; then
            echo "No changes to llms.txt or llms-full.txt"
            exit 0
          fi
          git commit -m "ci: regenerate llms.txt and llms-full.txt"
          git push -f origin "$BRANCH"
          # Find-or-create the canonical PR for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            printf "Reusing existing PR #%s for %s\n" "$EXISTING_PR" "$BRANCH"
            NEW_PR="$EXISTING_PR"
          else
            PR_URL=$(gh pr create --base main --head "$BRANCH" \
              --title "ci: regenerate llms.txt and llms-full.txt" \
              --body "Automated regeneration of LLM context files triggered by source changes.")
            NEW_PR=$(gh pr view "$PR_URL" --json number --jq '.number')
            printf "Created PR #%s\n" "$NEW_PR"
          fi
          # Auto-merge via squash; --auto enables GitHub native auto-merge
          # which waits for required checks then merges automatically.
          # [skip ci] prevents the merge commit from re-triggering this workflow.
          if gh pr merge "$NEW_PR" --auto --squash \
            --subject "ci: regenerate llms.txt and llms-full.txt [skip ci]" \
            --delete-branch=false; then
            printf "Auto-merge enabled for PR #%s\n" "$NEW_PR"
          else
            EXIT_CODE=$?
            printf "WARNING: Auto-merge failed for PR #%s (exit %d)\n" \
              "$NEW_PR" "$EXIT_CODE" >&2
          fi
        env:
          GH_TOKEN: ${{ github.token }}
