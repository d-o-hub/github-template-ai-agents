name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Check PR author, not actor — much more stable
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for all checks to pass
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAX_RETRIES = 60;
            const POLL_INTERVAL_MS = 30000;

            for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
              console.log(`Checking status (attempt ${attempt + 1}/${MAX_RETRIES})...`);

              try {
                const { data: status } = await github.rest.repos.getCombinedStatusForRef({
                  ...context.repo,
                  ref: context.payload.pull_request.head.sha
                });

                console.log(`Current state: ${status.state}`);

                if (status.state === 'success') {
                  console.log('✅ All checks passed!');
                  return;
                }

                if (status.state === 'failure' || status.state === 'error') {
                  core.setFailed(`❌ Checks failed with state: ${status.state}`);
                  return;
                }
              } catch (error) {
                console.warn(`⚠️ Error fetching status: ${error.message}`);
              }

              if (attempt < MAX_RETRIES - 1) {
                console.log(`Sleeping for ${POLL_INTERVAL_MS / 1000}s...`);
                await new Promise(resolve => setTimeout(resolve, POLL_INTERVAL_MS));
              }
            }

            core.setFailed('⏳ Timeout waiting for checks to complete');

      - name: Auto-merge Dependabot PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              console.log(`Merging PR #${context.payload.pull_request.number}...`);
              await github.rest.pulls.merge({
                ...context.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash'
              });
              console.log('✅ PR merged successfully');
            } catch (error) {
              core.setFailed(`❌ Failed to merge PR: ${error.message}`);
            }
