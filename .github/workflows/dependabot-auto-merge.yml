---
name: Dependabot Auto-Merge

# yamllint disable-line rule:truthy
on: pull_request

jobs:
  auto-merge:
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for Dependabot PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;

            // 1. Fetch PR details, auto-merge status, and unresolved review threads
            const prQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    state
                    autoMergeRequest {
                      enabledAt
                    }
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                      }
                    }
                  }
                }
              }
            `;

            const { repository } = await github.graphql(prQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber
            });

            const pr = repository.pullRequest;

            if (pr.state !== 'OPEN') {
              console.log(`PR #${prNumber} is ${pr.state}. Exiting.`);
              return;
            }

            // 2. Resolve all unresolved review threads (e.g., Codacy false positives)
            const unresolvedThreads = pr.reviewThreads.nodes.filter(t => !t.isResolved);
            if (unresolvedThreads.length > 0) {
              console.log(`Resolving ${unresolvedThreads.length} review thread(s)...`);
              for (const thread of unresolvedThreads) {
                console.log(`  Resolving thread ${thread.id}...`);
                await github.graphql(`
                  mutation($threadId: ID!) {
                    resolveReviewThread(input: {threadId: $threadId}) {
                      thread { id }
                    }
                  }
                `, { threadId: thread.id });
              }
              console.log('✅ All review threads resolved');
            } else {
              console.log('No unresolved review threads');
            }

            // 3. Enable GitHub native auto-merge (handles linear history, branch updates,
            //    and required checks automatically using system privileges)
            if (pr.autoMergeRequest) {
              console.log('✅ Auto-merge already enabled');
            } else {
              console.log('Enabling auto-merge (squash)...');
              await github.graphql(`
                mutation($prId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $prId, mergeMethod: SQUASH}) {
                    pullRequest { autoMergeRequest { enabledAt } }
                  }
                }
              `, { prId: pr.id });
              console.log('✅ Auto-merge enabled — GitHub will merge when all requirements are met');
            }
