---
name: Dependabot Auto-Merge

# yamllint disable-line rule:truthy
on: pull_request

permissions:
  contents: read

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Wait for all checks to pass
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: context.payload.pull_request.head.sha
            });
            const pending = checks.check_runs.filter(c => c.status !== 'completed');
            if (pending.length > 0) {
              core.setFailed('Checks still running');
            }
            const failures = checks.check_runs.filter(c =>
              c.conclusion === 'failure' || c.conclusion === 'cancelled'
            );
            if (failures.length > 0) {
              core.setFailed('Some checks failed');
            }

      - name: Auto-merge Dependabot PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              ...context.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            });
