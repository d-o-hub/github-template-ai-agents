---
name: CI + Labels Setup

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # NOTE: Labels initialization removed from automated CI
  # The gh-labels-creator.sh script is available for manual use:
  #   ./scripts/gh-labels-creator.sh --ci
  # This requires GITHUB_TOKEN with write permissions which most
  # repository tokens don't have by default.

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup skills
        run: ./scripts/setup-skills.sh

      - name: Validate skill symlinks
        run: ./scripts/validate-skills.sh

      - name: Validate skill format
        run: ./scripts/validate-skill-format.sh

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: validate-skills
    timeout-minutes: 10  # Fail fast instead of waiting 6 hours
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (if package.json exists)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        if: hashFiles('package.json') != ''

      - name: Setup Rust (if Cargo.toml exists)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        if: hashFiles('Cargo.toml') != ''

      - name: Setup Python (if requirements.txt or pyproject.toml exists)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Setup Go (if go.mod exists)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
        if: hashFiles('go.mod') != ''

      - name: Install dependencies (Node)
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Install dependencies (Python)
        run: |
          pip install ruff black pytest
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Run quality gate
        run: |
          echo "Setting up skills..."
          ./scripts/setup-skills.sh
          echo ""
          echo "Verifying symlinks..."
          ls -la .claude/skills/ | head -10
          echo ""
          echo "Running quality gate..."
          # Skip BATS tests in CI to prevent recursion (tests call quality_gate.sh)
          SKIP_TESTS=true ./scripts/quality_gate.sh

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (if package.json exists)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        if: hashFiles('package.json') != ''

      - name: Setup Rust (if Cargo.toml exists)
        uses: dtolnay/rust-toolchain@stable
        if: hashFiles('Cargo.toml') != ''

      - name: Setup Python (if requirements.txt or pyproject.toml exists)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Setup Go (if go.mod exists)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
        if: hashFiles('go.mod') != ''

      - name: Install dependencies (Node)
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Install dependencies (Python root)
        run: pip install -r requirements.txt
        if: hashFiles('requirements.txt') != ''

      - name: Install dependencies (Python skills)
        run: |
          for dir in .agents/skills/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Installing dependencies for $dir..."
              pip install -r "$dir/requirements.txt"
            fi
          done
        if: hashFiles('.agents/skills/*/requirements.txt') != ''

      - name: Run tests (Node)
        run: npm test
        if: hashFiles('package.json') != ''

      - name: Run tests (Rust)
        run: cargo test --lib
        if: hashFiles('Cargo.toml') != ''

      - name: Run tests (Python root)
        run: pytest tests/ -v
        if: hashFiles('requirements.txt') != ''

      - name: Run tests (Python skills)
        run: |
          for dir in .agents/skills/*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "Running tests for $dir..."
              (cd "$dir" && python -m pytest tests/ -v -m "not live")
            fi
          done
        if: hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Run tests (Go)
        run: go test ./...
        if: hashFiles('go.mod') != ''

      - name: Setup BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name '*.bats' -print -quit 2>/dev/null)" ]; then
            echo "Running BATS tests..."
            bats tests/*.bats
          else
            echo "No BATS tests found"
          fi
