---
name: CI + Labels Setup

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

# Default permissions for all jobs
permissions:
  contents: read

jobs:
  labels:
    name: Initialize GitHub Labels
    runs-on: ubuntu-latest
    # Requires write permission to create labels
    # See: https://docs.github.com/en/rest/issues/labels#create-a-label
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Ensure script is executable
        run: chmod +x scripts/gh-labels-creator.sh

      - name: Run label initialization
        run: ./scripts/gh-labels-creator.sh --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Fail fast instead of waiting 6 hours
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Setup skills
        run: ./scripts/setup-skills.sh

      - name: Setup Node.js (if package.json exists)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.2.0
        with:
          node-version: '22'
        if: hashFiles('package.json') != ''

      - name: Setup Rust (if Cargo.toml exists)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          components: rustfmt, clippy
        if: hashFiles('Cargo.toml') != ''

      - name: Setup Python (if requirements.txt or pyproject.toml exists)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.3.0
        with:
          python-version: '3.11'
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Setup Go (if go.mod exists)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.3.0
        with:
          go-version: '1.21'
        if: hashFiles('go.mod') != ''

      - name: Install dependencies (Node)
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Install dependencies (Python)
        run: |
          pip install ruff black pytest
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Install shellcheck and bats
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Run quality gate
        run: |
          SKIP_GLOBAL_HOOKS_CHECK=true ./scripts/quality_gate.sh

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Setup skills
        run: ./scripts/setup-skills.sh

      - name: Setup Node.js (if package.json exists)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.2.0
        with:
          node-version: '22'
        if: hashFiles('package.json') != ''

      - name: Setup Rust (if Cargo.toml exists)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        if: hashFiles('Cargo.toml') != ''

      - name: Setup Python (if requirements.txt or pyproject.toml exists)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.3.0
        with:
          python-version: '3.11'
        if: >-
          hashFiles('requirements.txt') != '' ||
          hashFiles('pyproject.toml') != '' ||
          hashFiles('.agents/skills/*/requirements.txt') != '' ||
          hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Setup Go (if go.mod exists)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.3.0
        with:
          go-version: '1.21'
        if: hashFiles('go.mod') != ''

      - name: Install dependencies (Node)
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Install dependencies (Python root)
        run: pip install -r requirements.txt
        if: hashFiles('requirements.txt') != ''

      - name: Install dependencies (Python skills)
        run: |
          for dir in .agents/skills/*/; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Installing dependencies for $dir..."
              pip install -r "$dir/requirements.txt"
            fi
          done
        if: hashFiles('.agents/skills/*/requirements.txt') != ''

      - name: Run tests (Node)
        run: npm test
        if: hashFiles('package.json') != ''

      - name: Run tests (Rust)
        run: cargo test --lib
        if: hashFiles('Cargo.toml') != ''

      - name: Run tests (Python root)
        run: pytest tests/ -v
        if: hashFiles('requirements.txt') != ''

      - name: Run tests (Python skills)
        run: |
          for dir in .agents/skills/*/; do
            if [ -f "$dir/pyproject.toml" ]; then
              echo "Running tests for $dir..."
              (cd "$dir" && python -m pytest tests/ -v -m "not live")
            fi
          done
        if: hashFiles('.agents/skills/*/pyproject.toml') != ''

      - name: Run tests (Go)
        run: go test ./...
        if: hashFiles('go.mod') != ''

      - name: Setup BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name '*.bats' \
            -print -quit 2>/dev/null)" ]
          then
            echo "Running BATS tests..."
            bats tests/*.bats
          else
            echo "No BATS tests found"
          fi

  update-ci-status:
    name: Update CI Status
    runs-on: ubuntu-latest
    needs: [labels, quality-gate, test]
    if: always()
    concurrency:
      group: ci-status-update
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.3.0
        with:
          python-version: '3.11'

      - name: Update CI status artifacts
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/update-ci-status.py

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -- .github/ci-status/ci-status.json .github/ci-status/ci-summary.md
          if git diff --staged --quiet; then
            printf "No changes to CI status\n"
            exit 0
          fi

          PR_BRANCH="ci/status-update"
          git checkout -b "$PR_BRANCH" 2>/dev/null || git checkout "$PR_BRANCH"
          git commit -m "ci: update ci status artifacts [skip ci]"
          git push origin --force -- "$PR_BRANCH"

          # Check if a PR already exists for this branch
          if ! EXISTING_PR=$(gh pr list --head "$PR_BRANCH" --state open \
            --json number --jq ".[0].number" 2>/tmp/gh-pr-list-err.log); then
            printf "WARNING: gh pr list failed: %s\n" "$(cat /tmp/gh-pr-list-err.log)" >&2
            printf "Skipping PR creation to avoid duplicates\n"
            exit 0
          fi
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            printf "PR #%s already exists for %s\n" "$EXISTING_PR" "$PR_BRANCH"
            exit 0
          fi

          gh pr create \
            --title "ci: update ci status artifacts" \
            --body "Automated CI status update from workflow run ${GITHUB_RUN_ID}." \
            --base main \
            --head "$PR_BRANCH" \
            --label "ci-status"

          # Post-creation concurrency validation: ensure only 1 open PR exists
          ALL_PR_NUMBERS=$(gh pr list --head "$PR_BRANCH" --state open \
            --json number --jq '.[].number' 2>/dev/null || echo "")
          PR_COUNT=$(printf "%s\n" "$ALL_PR_NUMBERS" | grep -c '^[0-9]' || echo "0")
          if [ "$PR_COUNT" -gt 1 ]; then
            printf "WARNING: Found %s open PRs for %s (should be 1). Cleaning up %s duplicate(s)...\n" \
              "$PR_COUNT" "$PR_BRANCH" "$((PR_COUNT - 1))"
            # Keep the newest (highest number), close others
            NEWEST=$(printf "%s\n" "$ALL_PR_NUMBERS" | sort -rn | head -1)
            for pr_num in $ALL_PR_NUMBERS; do
              if [ "$pr_num" != "$NEWEST" ]; then
                printf "  Closing duplicate PR #%s...\n" "$pr_num"
                # Do NOT use --delete-branch: all duplicates share ci/status-update
                gh pr close "$pr_num" 2>/dev/null || true
              fi
            done
            printf "  Kept PR #%s as the canonical CI status PR\n" "$NEWEST"
          fi
