---
name: Knowledge Cleanup

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Prune Redundant Lessons
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run cleanup script
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh --prune

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: prune redundant knowledge"
          branch: knowledge-cleanup
          title: "chore: prune redundant knowledge"
          body: "Automated cleanup of redundant or outdated knowledge artifacts."
