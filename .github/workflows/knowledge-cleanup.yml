---
name: Knowledge Cleanup

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-knowledge:
    name: Identify Outdated Knowledge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Find Stale Documentation
        run: |
          echo "# Knowledge Cleanup Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check for outdated lessons (90+ days old, issues resolved)
          echo "## Potentially Outdated Lessons" >> "$GITHUB_STEP_SUMMARY"
          echo "Lessons older than 90 days that may no longer apply:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Find lessons with dates
          grep -n "^\*\*Date\*\*:" agents-docs/LESSONS.md | while read -r line; do
            lesson_date=$(echo "$line" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            if [ -n "$lesson_date" ]; then
              days_old=$(( ( $(date +%s) - $(date -d "$lesson_date" +%s 2>/dev/null || echo 0) ) / 86400 ))
              if [ "$days_old" -gt 90 ]; then
                line_num=$(echo "$line" | cut -d: -f1)
                lesson_id=$(sed -n "$((line_num - 2))p" agents-docs/LESSONS.md | grep -oE "LESSON-[0-9]+")
                echo "- $lesson_id ($lesson_date, ${days_old} days old)" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check for duplicate patterns
          echo "## Duplicate Patterns" >> "$GITHUB_STEP_SUMMARY"
          echo "Similar lessons that could be consolidated:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Find similar tags
          grep "^\*\*Tags\*\*:" agents-docs/LESSONS.md | sort | uniq -d | head -5 | while read -r line; do
            tag=$(echo "$line" | grep -oE '#[a-z-]+' | head -1)
            if [ -n "$tag" ]; then
              count=$(grep -c "Tags.*$tag" agents-docs/LESSONS.md)
              if [ "$count" -gt 2 ]; then
                echo "- $tag appears in $count lessons (consider consolidation)" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check for lessons with no files modified (theoretical only)
          echo "## Lessons Without Code Impact" >> "$GITHUB_STEP_SUMMARY"
          echo "Lessons that don't reference actual file changes:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          grep -B5 "^\*\*Files Modified\*\*:" agents-docs/LESSONS.md | grep "^### LESSON" | while read -r lesson; do
            lesson_id=$(echo "$lesson" | grep -oE "LESSON-[0-9]+")
            # Check if files were actually listed after "Files Modified"
            if ! grep -A3 "^### $lesson_id" agents-docs/LESSONS.md | grep -q "^- \`; then
              echo "- $lesson_id (no files listed)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Cleanup Criteria" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "A lesson should be considered for removal if:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Issue is fully resolved and no longer relevant" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Superseded by newer lessons" >> "$GITHUB_STEP_SUMMARY"
          echo "3. No actual code changes resulted" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Duplicates existing patterns" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ NEVER remove: Skills, scripts, or working code" >> "$GITHUB_STEP_SUMMARY"

      - name: Create Knowledge Cleanup PR
        uses: peter-evans/create-pull-request@5b4a9f6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: identify outdated knowledge for review"
          title: "[Knowledge Cleanup] Review Outdated Lessons"
          body: |
            ## Knowledge Cleanup Report

            This analysis identifies documentation that may no longer provide value.

            ### Criteria for Removal
            A lesson should be removed if it:
            - ✅ Issue is fully resolved (no longer relevant)
            - ✅ Superseded by newer lessons with better solutions
            - ✅ No actual code/files were modified
            - ✅ Duplicates existing patterns

            ### Safeguards
            - ⚠️ NEVER remove: `.agents/skills/`
            - ⚠️ NEVER remove: `scripts/`
            - ⚠️ NEVER remove: Working code or tests
            - ⚠️ ONLY remove: Outdated documentation

            ### Review Process
            1. Check workflow summary for identified lessons
            2. Verify issues are truly resolved
            3. Confirm newer lessons exist
            4. Mark as deprecated before removal

            Check the workflow summary for specific lessons to review.

          draft: true
          branch: automated/knowledge-cleanup-${{ github.run_number }}
          delete-branch: true
          labels: |
            documentation
            cleanup
            knowledge
            automated
