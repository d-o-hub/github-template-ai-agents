---
name: Release Drafter

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update-changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install conventional-changelog-cli
        run: npm install -g conventional-changelog-cli

      - name: Generate changelog
        run: |
          conventional-changelog -p angular -i CHANGELOG.md -s

      - name: Create PR with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          PR_BRANCH="docs/update-changelog"
          git checkout -b "$PR_BRANCH" 2>/dev/null || git checkout "$PR_BRANCH"
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push origin --force -- "$PR_BRANCH"
          if EXISTING_PR=$(gh pr list --head "$PR_BRANCH" \
            --state open --json number --jq '.[0].number' 2>/dev/null); then
            echo "PR #$EXISTING_PR already exists"
            NEW_PR="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --title "docs: update CHANGELOG.md" \
              --body "Automated changelog update from conventional commits." \
              --base main \
              --head "$PR_BRANCH" \
              --label "documentation")
            NEW_PR=$(gh pr view "$PR_URL" --json number --jq '.number')
            echo "Created PR #$NEW_PR"
          fi
          if gh pr merge "$NEW_PR" \
            --squash \
            --subject "docs: update CHANGELOG.md [skip ci]" \
            --admin \
            --delete-branch=false; then
            echo "Auto-merged PR #$NEW_PR"
          else
            echo "WARNING: Auto-merge failed for PR #$NEW_PR" >&2
          fi

  draft-release:
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Draft GitHub release
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809  # v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
