---
name: Release Drafter

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update-changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.2.0
        with:
          node-version: '22'

      - name: Install conventional-changelog-cli
        run: npm install -g conventional-changelog-cli

      - name: Generate changelog
        run: |
          conventional-changelog -p angular -i CHANGELOG.md -s

      - name: Create PR with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          PR_BRANCH="docs/update-changelog"
          git checkout -b "$PR_BRANCH" 2>/dev/null || git checkout "$PR_BRANCH"
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push origin --force -- "$PR_BRANCH"
          if EXISTING_PR=$(gh pr list --head "$PR_BRANCH" \
            --state open --json number --jq '.[0].number' 2>/dev/null); then
            echo "PR #$EXISTING_PR already exists"
          else
            gh pr create \
              --title "docs: update CHANGELOG.md" \
              --body "Automated changelog update from conventional commits." \
              --base main \
              --head "$PR_BRANCH" \
              --label "documentation"
          fi

  draft-release:
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Draft GitHub release
        uses: release-drafter/release-drafter@805574fd5375e6902a5875239fb834f515c41111  # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
