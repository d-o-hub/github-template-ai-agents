---
name: Sync Turso Skill

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-turso-skill
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6.0.2

      - name: Fetch latest Turso release and llms.txt
        run: |
          set -euo pipefail
          LATEST_RELEASE="$(curl -fsSL \
            https://api.github.com/repos/tursodatabase/turso/releases/latest \
            | jq -r '.tag_name')"
          test -n "$LATEST_RELEASE" && test "$LATEST_RELEASE" != "null"
          curl -fsSL https://docs.turso.tech/llms.txt -o /tmp/llms.txt
          echo "LATEST_RELEASE=$LATEST_RELEASE" >> "$GITHUB_ENV"

      - name: Compare llms.txt with cached version
        id: check_changes
        run: |
          set -euo pipefail
          mkdir -p .agents/skills/turso-db/references

          if [ ! -f .agents/skills/turso-db/references/llms.txt ] || \
             ! cmp -s /tmp/llms.txt .agents/skills/turso-db/references/llms.txt; then
            cp /tmp/llms.txt .agents/skills/turso-db/references/llms.txt
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Skill Version
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          grep -q '^version:' .agents/skills/turso-db/SKILL.md
          sed -i "s/^version: .*/version: "\"${LATEST_RELEASE#v}\""/" .agents/skills/turso-db/SKILL.md

      - name: Ensure labels exist
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create automation --color "1d76db" --description "Automation updates" || true
          gh label create skill-update --color "5319e7" --description "Skill synchronization updates" || true

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ github.token }}
          branch: sync-turso-skill
          delete-branch: true
          commit-message: "feat(turso-db): sync with latest Turso docs (${{ env.LATEST_RELEASE }})"
          title: "feat(turso-db): sync with latest Turso docs (${{ env.LATEST_RELEASE }})"
          body: |
            This PR updates the `turso-db` skill with the latest Turso documentation and API surface.

            - Fetched from: https://docs.turso.tech/llms.txt
            - Turso Release: ${{ env.LATEST_RELEASE }}
            - Release URL: https://github.com/tursodatabase/turso/releases/tag/${{ env.LATEST_RELEASE }}

            Please review the changes and adapt the skill content if necessary.
          labels: |
            automation
            skill-update
