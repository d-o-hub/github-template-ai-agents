name: Version Propagation

on:
  push:
    paths:
      - VERSION
    branches:
      - main
      - 'feat/**'

permissions:
  contents: write

jobs:
  propagate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c003d8d9e9be628f3d4e86e9a9723a # v4.3.0
        with:
          fetch-depth: 0

      - name: Propagate version to all files
        run: |
          chmod +x scripts/propagate-version.sh
          ./scripts/propagate-version.sh

      - name: Commit version propagation
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md QUICKSTART.md agents-docs/MIGRATION.md CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: propagate version $VERSION to all files"
            git push
          fi
