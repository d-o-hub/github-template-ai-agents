---
name: Version Propagation

# yamllint disable-line rule:truthy
on:
  push:
    paths:
      - VERSION
    branches:
      - main
      - 'feat/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  propagate-version:
    name: Propagate Version Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Propagate version to all files
        run: |
          chmod +x scripts/propagate-version.sh
          ./scripts/propagate-version.sh

      - name: Commit version propagation
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md QUICKSTART.md agents-docs/MIGRATION.md CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: propagate version $VERSION to all files"
            git push
          fi
