---
name: Monthly DORA Report
on:
  schedule:
    - cron: '0 0 1 * *'  # First of every month
  workflow_dispatch:

jobs:
  dora-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Fetch GitHub data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/releases" --paginate \
            --jq '[.[] | {tag: .tag_name, published: .published_at}]' \
            > /tmp/releases.json || echo '[]' > /tmp/releases.json
          gh api "/repos/${{ github.repository }}/pulls?state=closed&base=main" --paginate \
            --jq '[.[] | select(.merged_at != null) | {pr: .number, created: .created_at, merged: .merged_at}]' \
            > /tmp/prs.json || echo '[]' > /tmp/prs.json

      - name: Generate DORA Report
        run: |
          touch .agents/metrics.jsonl dora-metrics.jsonl
          if [ -f .agents/skills/dora-report/scripts/compute_dora.py ]; then
            python3 .agents/skills/dora-report/scripts/compute_dora.py \
              --releases /tmp/releases.json \
              --prs /tmp/prs.json \
              --agent-metrics .agents/metrics.jsonl \
              --dora-metrics dora-metrics.jsonl \
              --output reports/DORA-REPORT.md \
              --period-days 30 \
              --repo "${{ github.repository }}"
          else
            {
              echo "# DORA Report"
              echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo ""
              echo "Agent metrics entries: $(wc -l < .agents/metrics.jsonl)"
            } > reports/DORA-REPORT.md
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: "docs(dora): update reports/DORA-REPORT.md [skip ci]"
          title: "docs(dora): monthly DORA performance report update"
          body: "Automated monthly DORA report generation."
          branch: "automation/dora-report"
          base: main
          labels: |
            agentic
            documentation
