---
name: Setup Repository
description: Auto-detect and setup language toolchains for CI
inputs:
  node-version:
    description: Node.js version
    default: '22'
  python-version:
    description: Python version
    default: '3.11'
  go-version:
    description: Go version
    default: '1.21'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
      if: hashFiles('package.json') != ''

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
      if: >-
        hashFiles('requirements.txt') != '' ||
        hashFiles('pyproject.toml') != '' ||
        hashFiles('.agents/skills/*/requirements.txt') != '' ||
        hashFiles('.agents/skills/*/pyproject.toml') != ''

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
      if: hashFiles('go.mod') != ''

    - name: Install Node dependencies
      run: npm ci
      shell: bash
      if: hashFiles('package.json') != ''

    - name: Install Python dependencies
      run: pip install ruff black pytest
      shell: bash
      if: >-
        hashFiles('requirements.txt') != '' ||
        hashFiles('pyproject.toml') != '' ||
        hashFiles('.agents/skills/*/requirements.txt') != '' ||
        hashFiles('.agents/skills/*/pyproject.toml') != ''

    - name: Install shellcheck and bats
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck bats
      shell: bash
